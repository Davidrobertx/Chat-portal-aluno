<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demonstração - Chat Portal do Aluno</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7f5;
      color: #17211a;
    }
    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
      text-align: center;
    }
    .card {
      max-width: 760px;
      background: #fff;
      border-radius: 28px;
      padding: 48px;
      box-shadow: 0 20px 70px rgba(0,0,0,.08);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 56px);
      color: #078C36;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="hero">
    <section class="card">
      <h1>Chat Portal do Aluno</h1>
      <p>
        Clique no ícone flutuante estilo WhatsApp no canto inferior para abrir o pop-up do atendimento virtual.
      </p>
    </section>
  </main>

  <script>
    window.PortalAlunoChatConfig = {
      titulo: "Assistente do Portal do Aluno",
      subtitulo: "Acesso, AVA, avaliações e tutoria",
      whatsapp: "55DDDNUMERO",
      textoWhatsapp: "Olá! Preciso de ajuda com o Portal do Aluno.",
      respostasUrl: "./respostas.json",
      corPrincipal: "#25D366",
      corCabecalho: "#078C36",
      textoBolha: "Precisa de ajuda?"
    };
  </script>

  <script src="./widget.js"></script>
</body>
</html>
